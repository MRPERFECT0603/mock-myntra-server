spring:
  application:
    name: Myntra

  datasource:
    url: jdbc:mysql://localhost:3306/myntra
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: ${PORT:8002}

fakeStore:
  baseUrl: ${FAKE_STORE_BASE_URL:https://fakestoreapi.com/products/}